<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0B0F14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Brilo" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <title>Brilo Details</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Phone frame (visual only on desktop) -->
  <div class="phone">
    <div class="app">

      <!-- App header -->
      <header class="app-header">
        <div class="brand">
          <span class="brand-mark">B</span>
          <div class="brand-text">
            <span class="brand-name">BRILO DETAILS</span>
            <span class="brand-sub">Mobile detailing</span>
          </div>
        </div>
        <div class="role-toggle" id="role-toggle">
          <button class="role-opt active" data-role="customer">Book</button>
          <button class="role-opt" data-role="admin">Owner</button>
        </div>
      </header>

      <!-- Scrollable screen area -->
      <main class="screens" id="screens">

        <!-- ===== CUSTOMER: BOOK ===== -->
        <section class="screen active" data-screen="book">
          <div class="hero">
            <h1>Showroom shine, <span class="accent">at your door.</span></h1>
            <p>Pick a package, choose a weekday slot, and track your detailer in real time.</p>
          </div>
          <h2 class="section-title">Packages</h2>
          <div id="package-list" class="pkg-list"></div>
        </section>

        <!-- ===== CUSTOMER: BOOKING FORM ===== -->
        <section class="screen" data-screen="bookform">
          <button class="back-btn" data-back="book">&lsaquo; Packages</button>
          <h2 class="section-title">Book <span id="selected-pkg-name" class="accent"></span> <span id="selected-pkg-price" class="price-tag"></span></h2>
          <div class="field"><label>Your name</label><input type="text" id="cust-name" placeholder="Jane Doe" /></div>
          <div class="field"><label>Phone</label><input type="tel" id="cust-phone" placeholder="555-0100" /></div>
          <div class="field"><label>Vehicle</label><input type="text" id="cust-vehicle" placeholder="2021 Honda Civic" /></div>
          <div class="field"><label>Address</label><input type="text" id="cust-address" placeholder="123 Main St" /></div>
          <div class="field"><label>Date (weekdays only)</label><input type="date" id="cust-date" /></div>
          <div class="field"><label>Time slot</label>
            <select id="cust-slot">
              <option value="08:00">8:00 AM</option>
              <option value="10:00">10:00 AM</option>
              <option value="12:00">12:00 PM</option>
              <option value="14:00">2:00 PM</option>
              <option value="16:00">4:00 PM</option>
            </select>
          </div>
          <div class="field"><label>Notes (optional)</label><textarea id="cust-notes" rows="2" placeholder="Gate code, pet hair, etc."></textarea></div>
          <div id="booking-error" class="error hidden"></div>
          <button class="btn-primary block" id="submit-booking">Confirm reservation</button>
        </section>

        <!-- ===== CUSTOMER: MY VISITS ===== -->
        <section class="screen" data-screen="visits">
          <h2 class="section-title">My visits</h2>
          <div class="lookup-row">
            <input type="tel" id="lookup-phone" placeholder="Your phone number" />
            <button class="btn-primary" id="lookup-btn">Find</button>
          </div>
          <div id="cust-reservations" class="reservation-list"></div>
        </section>

        <!-- ===== CUSTOMER: REVIEWS ===== -->
        <section class="screen" data-screen="reviews">
          <h2 class="section-title">Reviews</h2>
          <div id="reviews-summary" class="reviews-summary"></div>
          <div id="reviews-list" class="reservation-list"></div>
          <div class="card form-card">
            <h3>Leave a review</h3>
            <div class="field"><label>Your name</label><input type="text" id="rev-name" placeholder="Jane Doe" /></div>
            <div class="field"><label>Rating</label><div class="star-input" id="rev-stars" role="radiogroup" aria-label="Rating"></div></div>
            <div class="field"><label>Vehicle (optional)</label><input type="text" id="rev-vehicle" placeholder="2021 Honda Civic" /></div>
            <div class="field"><label>Comment</label><textarea id="rev-comment" rows="3" placeholder="Tell others how it went..."></textarea></div>
            <div id="review-error" class="error hidden"></div>
            <button class="btn-primary block" id="submit-review">Post review</button>
          </div>
        </section>

        <!-- ===== ADMIN: JOBS ===== -->
        <section class="screen" data-screen="jobs">
          <h2 class="section-title">Jobs</h2>
          <div class="stats" id="admin-stats"></div>
          <div class="filter-row" id="filter-row">
            <button class="chip active" data-filter="all">All</button>
            <button class="chip" data-filter="requested">Requested</button>
            <button class="chip" data-filter="assigned">Assigned</button>
            <button class="chip" data-filter="on_the_way">En route</button>
            <button class="chip" data-filter="completed">Done</button>
          </div>
          <div id="admin-reservations" class="reservation-list"></div>
        </section>

        <!-- ===== ADMIN: TEAM ===== -->
        <section class="screen" data-screen="team">
          <h2 class="section-title">Detailers</h2>
          <div id="detailer-list" class="pkg-list"></div>
          <div class="card form-card">
            <h3>Add detailer</h3>
            <div class="field"><label>Name</label><input type="text" id="new-detailer-name" placeholder="Carlos R." /></div>
            <div class="field"><label>Phone</label><input type="tel" id="new-detailer-phone" placeholder="555-0123" /></div>
            <button class="btn-primary block" id="add-detailer">Add detailer</button>
          </div>
        </section>

        <!-- ===== ADMIN: PRICING ===== -->
        <section class="screen" data-screen="pricing">
          <h2 class="section-title">Pricing</h2>
          <div id="pricing-editor" class="pkg-list"></div>
          <div class="card form-card">
            <h3>Add package</h3>
            <div class="field"><label>Name</label><input type="text" id="new-pkg-name" placeholder="Express Wash" /></div>
            <div class="field"><label>Price ($)</label><input type="number" id="new-pkg-price" min="0" placeholder="49" /></div>
            <div class="field"><label>Duration (min)</label><input type="number" id="new-pkg-duration" min="15" placeholder="60" /></div>
            <div class="field"><label>Description</label><input type="text" id="new-pkg-desc" placeholder="Exterior wash & dry" /></div>
            <button class="btn-primary block" id="add-pkg">Add package</button>
            <button class="link-btn" id="reset-data">Reset demo data</button>
          </div>
        </section>

      </main>

      <!-- Bottom navigation -->
      <nav class="bottom-nav" id="bottom-nav"></nav>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="app.js"></script>
</body>
</html>
